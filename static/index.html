<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#183c35">
    <title>Meal Helper</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/" aria-label="Meal Helper home">
        <span class="brand-mark">M</span>
        <span>Meal Helper</span>
      </a>
      <nav class="main-tabs" aria-label="Main navigation">
        <button class="tab active" data-view="week">This week</button>
        <button class="tab" data-view="recipes">Recipes</button>
        <button class="tab" data-view="ingredients">Ingredients</button>
      </nav>
      <button type="button" id="open-suggestion" class="header-action">Suggest</button>
    </header>

    <main>
      <section id="week-view" class="view"></section>
      <section id="recipes-view" class="view hidden"></section>
      <section id="ingredients-view" class="view hidden"></section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="recipe-dialog" class="dialog recipe-dialog">
      <form id="recipe-form" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Recipe</p>
            <h2 id="recipe-dialog-title">Edit recipe</h2>
          </div>
          <button type="button" class="icon-button dialog-close" aria-label="Close" title="Close">&times;</button>
        </div>

        <div class="form-grid">
          <label class="field field-wide">
            <span>Name</span>
            <input id="recipe-name" name="name" required maxlength="160">
          </label>
          <label class="field">
            <span>Category</span>
            <select id="recipe-category" name="category" required></select>
          </label>
          <label class="field">
            <span>Instructions URL</span>
            <input id="recipe-url" name="url" type="url" placeholder="https://">
          </label>
          <label class="field field-wide">
            <span>Short instructions</span>
            <textarea id="recipe-instructions" name="instructions" maxlength="1200" rows="4" placeholder="A few steps or reminders for cooking this recipe"></textarea>
          </label>
        </div>

        <div class="section-heading">
          <div>
            <p class="eyebrow">Shopping</p>
            <h3>Ingredients</h3>
          </div>
          <button type="button" id="add-ingredient-row" class="button secondary">+ Add ingredient</button>
        </div>

        <details class="ingredient-parser-panel">
          <summary>Paste ingredient list</summary>
          <div class="ingredient-parser-fields">
            <label class="field">
              <span>Unstructured ingredients</span>
              <textarea id="recipe-ingredient-text" maxlength="4000" rows="5" placeholder="2 cans chickpeas&#10;1 tbsp olive oil&#10;3 cloves garlic"></textarea>
            </label>
            <div class="ingredient-parser-actions">
              <span id="ingredient-parser-status" class="ingredient-parser-status" role="status" aria-live="polite"></span>
              <button type="button" id="parse-recipe-ingredients" class="button secondary">Fill ingredients</button>
            </div>
          </div>
        </details>
        <div id="ingredient-rows" class="ingredient-editor"></div>

        <details class="new-ingredient-panel">
          <summary>New ingredient</summary>
          <div class="new-ingredient-fields">
            <label class="field">
              <span>Name</span>
              <input id="new-ingredient-name" maxlength="100">
            </label>
            <label class="field">
              <span>Default unit</span>
              <select id="new-ingredient-unit"></select>
            </label>
            <label class="check-field">
              <input id="new-ingredient-whole-foods" type="checkbox" checked>
              <span>Buy at Whole Foods</span>
            </label>
            <button type="button" id="create-ingredient" class="button secondary">Create</button>
          </div>
        </details>

        <div class="dialog-actions">
          <button type="button" class="button ghost dialog-close">Cancel</button>
          <button type="submit" class="button primary">Save recipe</button>
        </div>
      </form>
    </dialog>

    <dialog id="add-recipe-dialog" class="dialog picker-dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">This week</p>
          <h2>Add a recipe</h2>
        </div>
        <button type="button" class="icon-button dialog-close" aria-label="Close" title="Close">&times;</button>
      </div>
      <div class="picker-toolbar">
        <input id="recipe-picker-search" type="search" placeholder="Search recipes" aria-label="Search recipes">
        <button id="create-recipe-for-week" class="button primary">+ New recipe</button>
      </div>
      <div id="recipe-picker-results" class="picker-results"></div>
    </dialog>

    <dialog id="instructions-dialog" class="dialog instructions-dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Instructions</p>
          <h2 id="instructions-title"></h2>
        </div>
        <button type="button" class="icon-button dialog-close" aria-label="Close" title="Close">&times;</button>
      </div>
      <div class="instructions-body">
        <p id="instructions-copy" class="instructions-copy"></p>
        <a id="instructions-url" class="button secondary instructions-link" target="_blank" rel="noopener noreferrer">Open full recipe</a>
      </div>
    </dialog>

    <dialog id="ingredient-dialog" class="dialog ingredient-dialog">
      <form id="ingredient-form" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Ingredient</p>
            <h2 id="ingredient-dialog-title">Edit ingredient</h2>
          </div>
          <button type="button" class="icon-button dialog-close" aria-label="Close" title="Close">&times;</button>
        </div>
        <div class="form-grid">
          <label class="field field-wide">
            <span>Name</span>
            <input id="managed-ingredient-name" name="name" required maxlength="100">
          </label>
          <label class="field">
            <span>Default unit</span>
            <select id="managed-ingredient-unit" name="default_unit" required></select>
          </label>
          <label class="check-field managed-source-field">
            <input id="managed-ingredient-whole-foods" name="whole_foods" type="checkbox" checked>
            <span>Buy at Whole Foods</span>
          </label>
        </div>
        <div class="dialog-actions">
          <button type="button" class="button ghost dialog-close">Cancel</button>
          <button type="submit" class="button primary">Save ingredient</button>
        </div>
      </form>
    </dialog>

    <dialog id="suggestion-dialog" class="dialog suggestion-dialog">
      <form id="suggestion-form" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Feedback</p>
            <h2>Submit suggestion</h2>
          </div>
          <button type="button" class="icon-button dialog-close" aria-label="Close" title="Close">&times;</button>
        </div>
        <label class="field">
          <span>Suggestion</span>
          <textarea id="suggestion-text" name="text" required maxlength="500" rows="6" placeholder="What should we improve?"></textarea>
        </label>
        <div id="suggestion-count" class="character-count">0 / 500</div>
        <div class="dialog-actions">
          <button type="button" class="button ghost dialog-close">Cancel</button>
          <button type="submit" class="button primary">Submit</button>
        </div>
      </form>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
